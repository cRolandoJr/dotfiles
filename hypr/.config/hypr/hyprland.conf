# ╔════════════════════════════════════════════════╗
# ║        HYPRLAND MASTER CONFIGURATION           ║
# ╚════════════════════════════════════════════════╝
# Archivo modular. Carga las configuraciones por orden lógico.

# (Wallust removido) los colores de borde se definen fijos en settings.conf

# Plugins primero: el .so debe cargarse antes de que settings.conf/binds.conf
# usen sus keywords (plugin{}) y dispatchers. Archivo generado por home-manager.
source = ~/.config/hypr-nix/plugins.conf

source = ~/.config/hypr/configs/monitors.conf
source = ~/.config/hypr/configs/autostart.conf
source = ~/.config/hypr/configs/environments.conf
source = ~/.config/hypr/configs/settings.conf
source = ~/.config/hypr/configs/rules.conf
source = ~/.config/hypr/configs/binds.conf
