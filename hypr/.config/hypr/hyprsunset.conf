# Hyprsunset config — blue-light filter
# Editado a mano (no generado por nix) porque ~/.config/hypr/ es symlink
# vía home-manager mkOutOfStoreSymlink. Tras editar, recargar con:
#   systemctl --user restart hyprsunset.service

max-gamma = 100

# Schedule deshabilitado: hyprsunset 0.3.3 tiene un bug que al arrancar el
# service agarra el último profile listado en vez del que corresponde por hora.
# Quedaba la pantalla en 3500K (warm) a cualquier hora.
#
# Por ahora controlamos manual con SUPER+CTRL+N (toggle-nightlight.sh).
# TODO: cuando hyprsunset arregle el bug — o cuando migremos a systemd timers
# vía services.hyprsunset.transitions — restaurar el schedule auto.
