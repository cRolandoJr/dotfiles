# hyprlock.conf — “epic” lockscreen
# Doc: https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock

$font = MesloLGS NF, JetBrainsMono Nerd Font, Noto Sans, Monospace

general {
    hide_cursor = true
    # Si quieres permitir unos ms para cancelar el bloqueo al tocar sin querer:
    # grace = 200
}

animations {
    enabled = true
    # Suaves y rápidas
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    animation = fadeIn,         1, 6, easeOutQuint
    animation = fadeOut,        1, 6, easeOutQuint
    animation = inputFieldDots, 1, 3, easeOutQuint
}

# Fondo: captura y desenfoque del escritorio (más limpio que imagen fija)
background {
    monitor =
    path = screenshot
    blur_passes = 2
    # color de tinte por si el blur no aplica en algún frame
    color = rgba(18, 18, 22, 0.55)
}

# Reproductor Multimedia (Muestra Artista - Título)
#label {
    monitor =
    # Usamos playerctl para obtener los metadatos. Si no hay nada, muestra vacío.
    text = cmd[update:1000] echo "$(playerctl metadata --format '{{ artist }} - {{ title }}' 2>/dev/null | sed -E 's/^ - $//')"
    font_family = $font
    font_size = 18
    color = rgb(255, 255, 255)
    position = 0, 50
    halign = center
    valign = bottom
#}

# Campo de contraseña centrado con gradiente; sin “relleno” para look glassy
input-field {
    monitor =
    size = 26%, 6%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.80)
    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color  = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_family = $font
    font_color = rgb(240,240,245)
    rounding = 18
    fade_on_empty = false
    dots_spacing = 0.35
    # hide_input = true    # estilo swaylock (si prefieres no mostrar longitud)

    placeholder_text = Type to unlock…
    fail_text = $PAMFAIL

    position = 0, -450
    halign = center
    valign = center

}

# Hora grande en la esquina superior derecha
label {
    monitor =
    text = $TIME
    font_family = $font
    font_size = 110
    position = -40, 0
    halign = right
    valign = top
}

# Fecha debajo de la hora
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_family = $font
    font_size = 28
    position = -40, -160
    halign = right
    valign = top
}

# Usuario@host en la parte inferior izquierda
label {
    monitor =
    text = cmd[update:60000] printf "%s@%s" "$USER" "$HOSTNAME"
    font_family = $font
    font_size = 20
    position = 40, -40
    halign = left
    valign = bottom
}

# Batería (si existe) + estado de energía
label {
    monitor =
    text = cmd[update:15000] sh -c 'B=$(upower -e 2>/dev/null | grep -m1 BAT || true); if [ -n "$B" ]; then P=$(upower -i "$B" | awk -F: "/percentage/ {gsub(/ /,\"\",$2);print \$2}"); S=$(upower -i "$B" | awk -F: "/state/ {gsub(/ /,\"\",$2);print \$2}"); echo "🔋 $P ($S)"; fi'
    font_family = $font
    font_size = 18
    position = 40, -80
    halign = left
    valign = bottom
}

# Red/SSID o “Ethernet”
label {
    monitor =
    text = cmd[update:15000] sh -c 'iwgetid -r 2>/dev/null || nmcli -t -f active,ssid dev wifi 2>/dev/null | awk -F: "$1==\"yes\"{print $2}" || echo "Ethernet"'
    font_family = $font
    font_size = 18
    position = 40, -120
    halign = left
    valign = bottom
}

