# hyprlock.conf — Deep Ocean lockscreen
# Paleta: cyan #00b4d8, azul NixOS #3b82f6, navy #0a0e17, fg #cdd6f4, fg-dim #7a8ba8
# Shader de viñeta: activado vía scripts/lock.sh (decoration:screen_shader del compositor)

# JetBrainsMono primero: es la fuente principal del setup; MesloLGS como fallback para Nerd Font glyphs.
$font = JetBrainsMono Nerd Font, MesloLGS NF, Noto Sans, Monospace

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    animation = fadeIn,          1, 2, easeOutQuint
    animation = fadeOut,         1, 1, easeOutQuint   # salida snappy: menos tiempo con la viñeta visible al desbloquear
    animation = inputFieldDots,  1, 2, easeOutQuint
}

# ── Fondo ─────────────────────────────────────────────────────────────────────
# path = screenshot: captura la pantalla al momento de bloquear.
# Riesgo de privacidad: si hay una ventana con información sensible abierta
# (terminal con tokens, browser con credenciales), quedará visible bajo el blur.
# Alternativa segura: path = ~/Wallpapers/Anime-Room.png (o cualquier wallpaper fijo).
# Elegí screenshot aquí porque el blur_passes=2 ofusca bastante, pero si el user
# prefiere privacidad completa, cambiar a ruta de wallpaper.
background {
    monitor =
    path = screenshot
    blur_passes = 3        # 3 passes da más difuminado que 2; con la viñeta queda elegante
    blur_size = 7          # tamaño del kernel de blur (px); valores altos = más suave pero más costo GPU
    color = rgba(10, 14, 23, 0.45)   # overlay navy Deep Ocean semitransparente sobre el blur
}

# ── Fecha — posición alta, cyan primario ──────────────────────────────────────
# Layout vertical (desde centro de pantalla, eje Y positivo = arriba):
#   +240  fecha (28px)
#   +100  hora (120px) — centroide visual alrededor de y=0
#     0   centro de pantalla
#    -60  saludo/usuario (14px)
#   -140  input field (50px alto)
#   -220  power profile label (11px)
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_family = $font
    font_size = 28
    color = rgba(0, 180, 216, 0.75)   # cyan #00b4d8, alpha 75%
    position = 0, 240
    halign = center
    valign = center
}

# ── Hora grande — blanco frío, no cyan ───────────────────────────────────────
# Decisión de diseño: hora en blanco frío (#cdd6f4) en vez de cyan.
# Razón: el reloj es el elemento de mayor jerarquía visual; a 120px de altura,
# el cyan sería demasiado saturado y llamativo — rompe el minimalismo Deep Ocean.
# El cyan queda reservado para la fecha (elemento secundario) y el input field.
# Resultado: contraste claro entre fecha (cyan tenue) y hora (blanco frío).
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    font_family = $font
    font_size = 120
    color = rgba(205, 214, 244, 0.98)  # fg frío Deep Ocean #cdd6f4, casi opaco
    position = 0, 40
    halign = center
    valign = center
}

# ── Saludo / usuario — fg-dim, pequeño ───────────────────────────────────────
# Muestra el nombre de usuario con whoami.
# Podría usarse $USER también, pero cmd[once] con whoami es más explícito.
# font_size 14, color fg-dim #7a8ba8: presente pero tenue — no compite con la hora.
label {
    monitor =
    text = cmd[once] whoami
    font_family = $font
    font_size = 14
    color = rgba(122, 139, 168, 0.80)   # fg-dim Deep Ocean #7a8ba8
    position = 0, -60
    halign = center
    valign = center
}

# ── Input field — cápsula minimalista ────────────────────────────────────────
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    inner_color = rgba(0, 0, 0, 0.50)
    outer_color = rgba(00b4d8ee) rgba(3b82f6ee) 45deg    # cyan → azul NixOS (Deep Ocean)
    check_color = rgba(34d399ee) rgba(00b4d8ee) 120deg   # verde ok → cyan al validar
    fail_color  = rgba(f87171ee) rgba(fb923cee) 40deg    # rojo crit → naranja warn al fallar
    font_family = $font
    font_color = rgb(240, 240, 245)
    rounding = 18
    fade_on_empty = true
    dots_spacing = 0.35
    placeholder_text = Type to unlock…
    fail_text = $PAMFAIL
    position = 0, -140
    halign = center
    valign = center
}

# ── Power profile — chip tenue al fondo ──────────────────────────────────────
label {
    monitor =
    text = cmd[update:30000] powerprofilesctl get 2>/dev/null || echo "—"
    font_family = $font
    font_size = 11
    color = rgba(0, 180, 216, 0.55)   # cyan #00b4d8, alpha 55% — casi invisible, decorativo
    position = 0, -220
    halign = center
    valign = center
}
