# hyprlock.conf
$font = MesloLGS NF, JetBrainsMono Nerd Font, Noto Sans, Monospace

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    animation = fadeIn,         1, 6, easeOutQuint
    animation = fadeOut,        1, 6, easeOutQuint
    animation = inputFieldDots, 1, 3, easeOutQuint
}

background {
    monitor =
    path = screenshot
    blur_passes = 2
    color = rgba(18, 18, 22, 0.55)
}

# Fecha — centrada
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_family = $font
    font_size = 28
    #color = rgba(255, 255, 255, 0.85)
    color = rgba(33, 204, 255, 0.65)
    position = 0, 160
    halign = center
    valign = center
}

# Hora grande — centrada
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    font_family = $font
    font_size = 120
    color = rgba(255, 255, 255, 0.98)
    position = 0, 20
    halign = center
    valign = center
}

# Input field — centrado debajo de la hora
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    inner_color = rgba(0, 0, 0, 0.50)
    outer_color = rgba(00b4d8ee) rgba(3b82f6ee) 45deg    # cyan → azul NixOS (Deep Ocean)
    check_color = rgba(34d399ee) rgba(00b4d8ee) 120deg   # verde ok → cyan al validar
    fail_color  = rgba(f87171ee) rgba(fb923cee) 40deg    # rojo crit → naranja warn al fallar
    font_family = $font
    font_color = rgb(240, 240, 245)
    rounding = 18
    fade_on_empty = true
    dots_spacing = 0.35
    placeholder_text = Type to unlock…
    fail_text = $PAMFAIL
    position = 0, -140
    halign = center
    valign = center
}

# Power profile actual — chip pequeño debajo del input field.
# cmd update cada 30s; muestra "balanced" / "performance" / "power-saver".
label {
    monitor =
    text = cmd[update:30000] powerprofilesctl get 2>/dev/null || echo "—"
    font_family = $font
    font_size = 11
    color = rgba(0, 180, 216, 0.55)
    position = 0, -230
    halign = center
    valign = center
}
