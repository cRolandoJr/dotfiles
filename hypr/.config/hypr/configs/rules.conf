# ╔════════════════════════════════════════════════╗
# ║             WINDOW & LAYER RULES               ║
# ╚════════════════════════════════════════════════╝

# --- REGLAS ESTRUCTURADAS (Bloques) ---

windowrule {
    name = terminal_flotante
    match:class = ^(kitty_float)$
    float = true
    size = 1450 800
    center = true
}

windowrule {
    name = fix_xwaylandvideobridge
    match:class = ^(xwaylandvideobridge)$
    opacity = 0.0
    no_anim = true
    no_focus = true
    max_size = 1 1
    no_blur = true
}

# --- REGLAS ANÓNIMAS (Una sola línea) ---

# VSCode ligeramente transparente
windowrule = match:class ^(code)$, opacity 0.98 0.98

# Waypaper siempre flotante
windowrule = match:class ^(waypaper)$, float true

# Rofi siempre mantiene el foco al abrirse (Corregido a snake_case)
windowrule = match:class ^(rofi)$, stay_focused true


# --- REGLAS DE CAPAS (Layer Rules) ---
# (SwayNC y otros elementos de la UI que no son ventanas)

# --- REGLAS DE CAPAS (Layer Rules) ---
# (SwayNC y otros elementos de la UI que no son ventanas)

# --- REGLAS DE CAPAS (Layer Rules) ---
# (SwayNC y otros elementos de la UI que no son ventanas)

layerrule {
    name = panel_swaync
    match:namespace = ^(swaync-control-center)$
    blur = true
    ignore_alpha = 0.5
}

layerrule {
    name = notificaciones_swaync
    match:namespace = ^(swaync-notification-window)$
    blur = true
    ignore_alpha = 0.0
}

