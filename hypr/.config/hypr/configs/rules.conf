# ╔════════════════════════════════════════════════╗
# ║             WINDOW & LAYER RULES               ║
# ╚════════════════════════════════════════════════╝

# --- REGLAS ESTRUCTURADAS (Bloques) ---

windowrule {
    name = terminal_flotante
    match:class = ^(foot_float)$
    float = true
    size = 1450 800
    center = true
}

windowrule {
    name = fix_xwaylandvideobridge
    match:class = ^(xwaylandvideobridge)$
    opacity = 0.0
    no_anim = true
    no_focus = true
    max_size = 1 1
    no_blur = true
}

windowrule {
    name = center_vscode_dialogs
    match:class = ^(Code)$
    match:title = ^(Visual Studio Code)$
    center = true
}

windowrule {
    name = ssh_askpass_float
    match:title = ^(OpenSSH Authentication Passphrase request)$
    float = true
    size = 480 200
    center = true
}

windowrule {
    name = satty_float
    match:class = ^(com\.gabm\.satty)$
    float = true
    size = 1280 720
    center = true
}

windowrule {
    name = blueman_float
    match:class = ^(blueman-manager|\.blueman-manager-wrapped_?)$
    float = true
    size = 720 520
    center = true
}

windowrule {
    name = pavucontrol_float
    match:class = ^(\.pavucontrol-wrapped|pavucontrol|org\.pulseaudio\.pavucontrol)$
    float = true
    size = 720 520
    center = true
}

windowrule {
    name = spotify_scratch
    match:class = ^(Spotify|spotify)$
    workspace = special:music silent
}

# --- REGLAS ANÓNIMAS (Una sola línea) ---

# VSCode ligeramente transparente
windowrule = match:class ^(code)$, opacity 0.98 0.98

# Waypaper siempre flotante
windowrule = match:class ^(waypaper)$, float true

windowrule = match:class ^(notion-app)$, opacity 0.95 0.90

windowrule = match:class ^(firefox)$, opacity 0.98 0.95
# --- REGLAS DE CAPAS (Layer Rules) ---
# Look & feel para popups que no son ventanas (mako, rofi, futuro hub eww).
# Sin estas reglas, el blur global de decoration{} no aplica a las layers,
# solo a windows.
#
# Sintaxis Hyprland 0.55+: `match:prop REGEX, effect VALUE`
# (KEY VALUE separados por espacio, pares separados por coma)

# mako (notifications)
layerrule = match:namespace ^(notifications)$, blur true, ignore_alpha 0.0

# rofi (launcher)
layerrule = match:namespace ^(rofi)$, blur true, ignore_alpha 0.0, dim_around true

# hub eww — sin blur: el bg 0.95 ya tapa lo de atrás, y el blur en surface
# rectangular creaba un halo gris visible en las esquinas redondeadas.
# El defwindow hub usa :namespace "hub" en eww.yuck — esto lo matchea.
layerrule = match:namespace ^(hub)$, ignore_alpha 0.0

# slurp (overlay de selección) — sin animaciones. Hyprland >=0.55 aplica
# fade-out al cerrar slurp; grim dispara antes de que termine y captura
# restos del dim/borde. Sin anim, slurp desaparece instantáneo.
layerrule = match:namespace ^(selection)$, no_anim on

