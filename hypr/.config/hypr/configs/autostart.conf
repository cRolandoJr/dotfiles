# UWSM ya importa el environment al systemd user manager y propaga DBus,
# así que las antiguas líneas dbus-update-activation-environment y
# systemctl --user import-environment ya no son necesarias.

# Cada app de larga vida se lanza con `uwsm app -- ...` para que entre en
# su propio systemd scope (app-graphical.slice). Beneficios: logs por app
# en journalctl, OOM por app sin tumbar Hyprland, cleanup ordenado.

# UI
exec-once = uwsm app -- env TZ=America/Argentina/Buenos_Aires waybar

# Widgets custom (calendar popup; ver ~/.config/eww/eww.yuck)
# Se invoca desde waybar con `eww open --toggle calendar` (on-click del clock).
exec-once = uwsm app -- eww daemon
# Trigger inicial del defpoll `weather`: eww no corre el primer poll cuando
# :initial está seteado. Espera al daemon y dispara una vez.
exec-once = uwsm app -- bash -c 'until eww ping >/dev/null 2>&1; do sleep 0.2; done; eww poll weather'
# mako: NO se lanza aquí. El paquete provee mako.service (Type=dbus,
# BusName=org.freedesktop.Notifications) que arranca on-demand cuando
# llega la primera notif. Lanzarlo dos veces (uwsm + dbus-activation)
# generaba conflicto de BusName.
exec-once = uwsm app -- awww-daemon
# Wallpaper: restaura el último seleccionado vía wallselect (SUPER+W).
exec-once = uwsm app -- bash -c 'until awww query >/dev/null 2>&1; do sleep 0.2; done; awww restore'

# OSD
exec-once = uwsm app -- swayosd-server

# Screen lock / idle
exec-once = uwsm app -- hypridle -c ~/.config/hypr/hypridle.conf

# Clipboard history (texto e imágenes)
exec-once = uwsm app -- wl-paste --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

# Nota: la notificación de cambio de layout (notify-layout.sh) ahora corre
# como systemd user service (notify-layout.service), definido en la
# nix-config (modules/desktop-hyprland.nix).
