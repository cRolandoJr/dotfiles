# ╔════════════════════════════════════════════════╗
# ║       SETTINGS, LOOK & FEEL (settings.conf)    ║
# ╚════════════════════════════════════════════════╝

# --- INPUT (Teclado y Ratón) ---
input {
    kb_layout = us
    kb_model =
    kb_variant = 
    kb_options = 
    kb_rules = 
    follow_mouse = 1

    touchpad {
        natural_scroll = true 
    }

    sensitivity = 0.7 # -1.0 <-> 1.0, 0 means no modification.
}

# --- GENERAL (Bordes Dinámicos y Layout) ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    # --- LA MAGIA DE WALLUST: Bordes que cambian con el wallpaper ---
    # Usa color2 y color4 en un ángulo de 45 grados para un degradado premium
    col.active_border = $color2 $color4 45deg
    # El borde inactivo toma el color de fondo para "esconderse" elegantemente
    col.inactive_border = $background
    
    resize_on_border = true
    layout = dwindle
    allow_tearing = false
}

# --- DECORATION (Sombras, Redondeo y Blur) ---
decoration {
    rounding = 15
    
    shadow {
        enabled = true
        range = 50
        render_power = 9 
        color = rgba(0,0,0,0.7)
    }
    
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# --- ANIMATIONS (Tus curvas personalizadas) ---
animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- LAYOUTS ---
dwindle {
    pseudotile = yes 
    preserve_split = yes 
}

master {
    #new_is_master = true
    #new_status = master
}

# --- MISCELLANEOUS ---
misc {
    force_default_wallpaper = -1 
    disable_hyprland_logo = false
    session_lock_xray = 1
}

# --- XWAYLAND ---
xwayland {
    enabled = true
    force_zero_scaling = true
}

# --- PERIPHERALS (Dispositivos específicos) ---
device {
    name = epic mouse V1
    sensitivity = -0.5
}

# --- PLUGINS ---
plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current

        enable_gesture = true 
        #gesture_fingers = 3  
        #gesture_distance = 300 
        #gesture_positive = true 
    }
}
