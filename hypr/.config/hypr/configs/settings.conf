# ╔════════════════════════════════════════════════╗
# ║       SETTINGS, LOOK & FEEL (settings.conf)    ║
# ╚════════════════════════════════════════════════╝

# --- INPUT (Teclado y Ratón) ---
input {
    kb_layout = us, latam
    kb_model =
    kb_variant = ,
    kb_options = grp:alt_shift_toggle
    kb_rules = 
    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }

    sensitivity = 0.7 # -1.0 <-> 1.0, 0 means no modification.
}

# --- GESTURES (Hyprland 0.50+ usa sintaxis declarativa, no el bloque gestures{}) ---
# Formato: gesture = FINGERS, DIRECTION, DISPATCHER [, ARGS]
# 3 dedos horizontal → cambia de workspace (izq = anterior, der = siguiente).
gesture = 3, horizontal, workspace

# --- GENERAL (Bordes Dinámicos y Layout) ---
general {
    gaps_in = 5
    gaps_out = 7
    border_size = 1

    # Deep Ocean borders
    col.active_border = rgb(00b4d8) rgb(3b82f6) 45deg   # cyan → azul NixOS
    col.inactive_border = rgb(1a2744)                    # navy border

    resize_on_border = true
    layout = dwindle
    allow_tearing = false
}

cursor {
    no_hardware_cursors = true
}

# --- DECORATION (Sombras, Redondeo y Blur) ---
decoration {
    rounding = 5

    shadow {
        enabled = true
        range = 50
        render_power = 9 
        color = rgba(0,0,0,0.7)
    }
    
    blur {
        enabled = true
        size = 4         # era 3
        passes = 2       # era 1 — dos pasadas gaussianas, blur más suave
        noise = 0.01     # grano sutil que rompe la uniformidad del glass
        contrast = 0.9
    }
}

# --- ANIMATIONS (Tus curvas personalizadas) ---
animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.16, 1, 0.3, 1        # OutExpo: snappy sin overshoot, para popups
    bezier = workspaceCurve, 0.25, 1, 0.5, 1   # OutQuart: arranca rápido, frena suave

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 5, workspaceCurve, slide
    animation = layers, 1, 5, smoothOut, slide
}

# --- LAYOUTS ---
dwindle {
    preserve_split = yes
    force_split = 2          # ventana nueva siempre cae a la der/abajo (determinista; 0 = sigue al mouse)
}

master {
    mfact = 0.6
    new_status = slave            # el master se queda fijo; las nuevas se apilan
    new_on_top = true             # la última de la pila arriba, a la vista
    orientation = left
}

scrolling {
    column_width = 0.5
    fullscreen_on_one_column = true
    focus_fit_method = 1                              # 1 = fit: trae la columna a vista sin centrar (1ª columna flush al borde izq)
    follow_focus = true
    explicit_column_widths = 0.333, 0.5, 0.667, 1.0   # presets que cicla colresize ±conf
    direction = right
}

# --- MISCELLANEOUS ---
misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
    session_lock_xray = 1

    # Swallow: cuando lanzás `mpv foto.jpg` desde kitty, kitty desaparece
    # mientras mpv corre y reaparece al cerrarlo. Layout limpio.
    # exception_regex: TUIs que abren ventanas hijo no deben triggerar swallow.
    enable_swallow = true
    swallow_regex = ^(kitty|kitty_float)$
    swallow_exception_regex = ^(nvim|vim|btop|lazygit|yazi)$
}

# --- XWAYLAND ---
xwayland {
    enabled = true
    force_zero_scaling = true
}

# --- PERIPHERALS (Dispositivos específicos) ---
device {
    name = epic mouse V1
    sensitivity = -0.5
}
