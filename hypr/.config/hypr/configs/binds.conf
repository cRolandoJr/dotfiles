# ╔════════════════════════════════════════════════╗
# ║                 KEYBINDINGS                    ║
# ╚════════════════════════════════════════════════╝

# --- VARIABLES PRINCIPALES ---
$terminal = kitty
$float_terminal = kitty --class=kitty_float
$FM2 = kitty --class=kitty_float -e yazi
$fileManager = thunar
$browser = firefox
$menu = rofi -show drun -theme ~/.config/rofi/config.rasi
$wallselect = ~/.config/rofi/wallselect/script.sh
$clipboard = ~/.config/hypr/scripts/cliphist_fuzzel.sh
$music = spotify --disable-gpu
$wifi = ~/.config/rofi/wifi/wifi_manager.sh

# --- APLICACIONES Y MENÚS ---
bind = SUPER, Return, exec, $terminal
bind = SUPER SHIFT, Return, exec, $float_terminal 
bind = SUPER, B, exec, $browser
bind = SUPER, E, exec, $FM2
bind = SUPER SHIFT, E, exec, $fileManager
bind = SUPER, M, exec, ~/.config/hypr/scripts/spotify-toggle.sh
bind = SUPER, T, exec, Telegram
bind = SUPER, Space, exec, $menu
bind = SUPER, W, exec, $wallselect
bind = SUPER, C, exec, $clipboard
bind = SUPER, L, exec, hyprlock
bind = SUPER, A, exec, $wifi
bind = SUPER, K, exec, ~/.config/hypr/scripts/keybinds-viewer.sh   # Cheatsheet de keybinds (rofi)

# Reload de waybar (config + style). Usar tras editar style.css o config.jsonc.
bind = SUPER SHIFT, R, exec, pkill -SIGUSR2 waybar

# --- GESTIÓN DE VENTANAS Y SISTEMA ---
bind = SUPER, Q, killactive,
bind = SUPER SHIFT, M, exit,
bind = SUPER, F, fullscreen,
bind = SUPER, V, togglefloating,
bind = SUPER, P, pseudo,
bind = SUPER, D, exec, ~/.config/hypr/scripts/toggle_float.sh
bind = SUPER CTRL, N, exec, ~/.config/hypr/scripts/toggle-nightlight.sh # Night light toggle (hyprsunset)
bind = SUPER, grave, exec, eww open --toggle hub              # Hub dashboard (grave = `)
bindd = SUPER, J, Toggle window split, layoutmsg, togglesplit

# --- NOTIFICACIONES ---
# DND toggle: activa/desactiva modo silencioso en mako + notif de feedback.
bind = SUPER, N, exec, ~/.config/hypr/scripts/toggle-dnd.sh
# Dismiss all: limpia todas las notificaciones visibles en pantalla.
bind = SUPER SHIFT, N, exec, makoctl dismiss --all

# --- POWER PROFILE ---
# Cicla entre balanced y performance vía powerprofilesctl.
bind = SUPER CTRL, P, exec, ~/.config/hypr/scripts/toggle-power-profile.sh

# --- EL SCRATCHPAD (Terminal Oculta) ---
bind = SUPER SHIFT, S, movetoworkspace, special:magic
bind = SUPER, S, togglespecialworkspace, magic

# --- MOVIMIENTO DE FOCO (Flechas y Vim) ---
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# --- MOVER VENTANA EN EL WORKSPACE ACTUAL ---
bind = SUPER SHIFT, left,  swapwindow, l
bind = SUPER SHIFT, right, swapwindow, r
bind = SUPER SHIFT, up,    swapwindow, u
bind = SUPER SHIFT, down,  swapwindow, d

# --- MODO REDIMENSIONAR (Submap) ---
# Presiona SUPER+R para entrar, ajusta con flechas, presiona Escape para salir.
bind = SUPER, R, submap, resize
submap = resize
binde = , right, resizeactive, 30 0
binde = , left, resizeactive, -30 0
binde = , up, resizeactive, 0 -30
binde = , down, resizeactive, 0 30
bind = , escape, submap, reset
submap = reset

# Submap MOVE: mover ventana flotante con flechas (espejo del resize).
# SUPER+G entra; flechas mueven 30px; SHIFT+flecha mueve 120px (paso grande); Esc sale.
# `moveactive` solo afecta a ventanas flotantes (kitty_float, satty, blueman, pavucontrol).
# Para tiled, seguí usando SUPER+SHIFT+flecha (swapwindow).
bind = SUPER, G, submap, move
submap = move
binde = , right, moveactive, 30 0
binde = , left,  moveactive, -30 0
binde = , up,    moveactive, 0 -30
binde = , down,  moveactive, 0 30
binde = SHIFT, right, moveactive, 120 0
binde = SHIFT, left,  moveactive, -120 0
binde = SHIFT, up,    moveactive, 0 -120
binde = SHIFT, down,  moveactive, 0 120
bind = , escape, submap, reset
submap = reset

# --- WORKSPACES (Escritorios Virtuales) ---
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# --- RATÓN (Mover y Redimensionar con clics) ---
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# --- HARDWARE (Volumen, Brillo, Multimedia) ---
# swayosd-client hace la acción Y muestra el OSD. NO encadenar con wpctl:
# ambos togglean → double-toggle (visible en mute como "luz prende y vuelve").
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise --max-volume 150
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind  = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl = , xf86audionext, exec, playerctl next
bindl = , xf86audioplay, exec, playerctl play-pause
bindl = , xf86audioprev, exec, playerctl previous

# --- CAPTURAS DE PANTALLA ---
# 1) Pantalla completa (output) -> clipboard (sin UI, instantáneo)
bind = , Print, exec, grim - | wl-copy

# 2) Región -> clipboard (sin UI, instantáneo)
#    -b 00000050: dim negro sutil (~31% alpha) en lugar del gris fuerte default.
#    -w 0: sin borde (el default es marco negro 2px).
bind = SUPER SHIFT, C, exec, grim -g "$(slurp -b 00000050 -w 0)" - | wl-copy

# 3) Región -> satty (anotar) -> guarda + clipboard
#    --early-exit cierra satty automáticamente al copiar/guardar (Ctrl+Enter en la UI).
bind = SUPER CTRL, C, exec, sh -c 'dir="$HOME/.local/share/screenshots"; mkdir -p "$dir"; grim -g "$(slurp -b 00000050 -w 0)" - | satty --filename - --output-filename "$dir/$(date +%Y%m%d-%H%M%S)-region.png" --early-exit --copy-command wl-copy'
