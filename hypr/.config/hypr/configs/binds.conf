# ╔════════════════════════════════════════════════╗
# ║                 KEYBINDINGS                    ║
# ╚════════════════════════════════════════════════╝

# --- VARIABLES PRINCIPALES ---
$mainMod = SUPER
$terminal = kitty
$float_terminal = kitty --class kitty_float
$fileManager = dolphin
$browser = firefox
$menu = rofi -show drun
$windowMenu = rofi -show window -show icons
$wallselect = ~/.config/rofi/wallselect/script.sh
$wifi = ~/.local/bin/rofi-wifi-menu
$music = spotify

# --- APLICACIONES Y MENÚS ---
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Return, exec, $float_terminal 
bind = $mainMod, B, exec, $browser        # [Cambiado] B de Browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, M, exec, $music          # [Cambiado] M de Music (Spotify)
bind = $mainMod, T, exec, telegram-desktop
bind = $mainMod, Space, exec, $menu       # Buscador principal
bind = $mainMod, TAB, exec, $windowMenu   # Cambiar entre ventanas abiertas
bind = $mainMod, W, exec, $wallselect     # Selector de Wallpapers
bind = $mainMod, A, exec, $wifi           # Menú WiFi
bind = $mainMod, N, exec, swaync-client -t # Panel de Notificaciones
bind = $mainMod, L, exec, hyprlock        # Bloquear pantalla

# --- GESTIÓN DE VENTANAS Y SISTEMA ---
bind = $mainMod, Q, killactive,           # Cerrar ventana
bind = $mainMod SHIFT, M, exit,           # [Cambiado] Salir de Hyprland (Previene accidentes)
bind = $mainMod, F, fullscreen,           # [Cambiado] F de Fullscreen (Estándar)
bind = $mainMod, V, togglefloating,       # Flotante on/off
bind = $mainMod, P, pseudo,               # Dwindle pseudo-tiling
bind = $mainMod, J, togglesplit,          # Dwindle split
bind = $mainMod, D, exec, ~/.config/hypr/scripts/toggle_float.sh

# --- EL SCRATCHPAD (Terminal Oculta) ---
# SUPER+SHIFT+S envía una ventana al limbo. SUPER+S la trae de vuelta.
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod, S, togglespecialworkspace, magic

# --- MOVIMIENTO DE FOCO (Flechas y Vim) ---
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l          # Estilo Vim: Izquierda
bind = $mainMod, L, movefocus, r          # Estilo Vim: Derecha
bind = $mainMod, K, movefocus, u          # Estilo Vim: Arriba
bind = $mainMod, J, movefocus, d          # Estilo Vim: Abajo

# --- MODO REDIMENSIONAR (Submap) ---
# Presiona SUPER+R para entrar, ajusta con flechas, presiona Escape para salir.
bind = $mainMod, R, submap, resize
submap = resize
binde = , right, resizeactive, 30 0
binde = , left, resizeactive, -30 0
binde = , up, resizeactive, 0 -30
binde = , down, resizeactive, 0 30
bind = , escape, submap, reset
submap = reset

# --- WORKSPACES (Escritorios Virtuales) ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# --- RATÓN (Mover y Redimensionar con clics) ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- HARDWARE (Volumen, Brillo, Multimedia) ---
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
binde = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl = , xf86audionext, exec, playerctl next
bindl = , xf86audioplay, exec, playerctl play-pause
bindl = , xf86audioprev, exec, playerctl previous

# --- CAPTURAS DE PANTALLA ---
# Usando la combinación estándar de recortes (SUPER+SHIFT+S, o en tu caso asigne la C de Capture)
bind = , Print, exec, hyprshot -m output --clipboard-only # Toda la pantalla
bind = $mainMod SHIFT, C, exec, hyprshot -m region --clipboard-only # Recorte rápido
bind = $mainMod CTRL, C, exec, grim -g "$(slurp)" - | swappy -f - # Recorte + Editar en Swappy
