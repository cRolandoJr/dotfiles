# hypridle.conf — by RolandoCobis + Copilot
# Doc: https://wiki.hyprland.org/Hypr-Ecosystem/hypridle

general {
    # Lanza hyprlock solo si no está ya corriendo.
    lock_cmd = pidof hyprlock >/dev/null || hyprlock
    # Bloquear antes de suspender (logind se encarga de la tapa/lid si aplica).
    before_sleep_cmd = loginctl lock-session
    # Asegura que el monitor vuelva a encender tras sleep.
    after_sleep_cmd = hyprctl dispatch dpms on
}

# 1) Atenuar brillo (suave) a los 2 min 30 s
#    Guarda y restaura el estado para no interferir con el brillo que prefieras.
listener {
    timeout =  300         # 2.5 min
    on-timeout = brightnessctl -s set 20%
    on-resume  = brightnessctl -r
}

# 2) Apagar retroiluminación del teclado (si existe) a los 2 min 30 s
listener {
    timeout = 150
    on-timeout = sh -c 'brightnessctl -sd rgb:kbd_backlight set 0 2>/dev/null || true'
    on-resume  = sh -c 'brightnessctl -rd rgb:kbd_backlight 2>/dev/null || true'
}

# 3) Bloquear sesión a los 5 min
#    Si hay media reproduciéndose, la pausamos de forma amable.
listener {
    timeout = 300
    on-timeout = sh -c 'pidof hyprlock || hyprlock'
}

# 4) Apagar DPMS a los 5 min 30 s (si NO hay reproducción activa)
#    Así no te quedas sin pantalla mientras miras algo.
listener {
    timeout = 330
    on-timeout = sh -c '[ "$(playerctl status 2>/dev/null)" != "Playing" ] && hyprctl dispatch dpms off || true'
    on-resume  = hyprctl dispatch dpms on
}

# 5) Suspender a los 30 min
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
