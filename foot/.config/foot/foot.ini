# foot — Deep Ocean
# Tema portado 1:1 de kitty/current-theme.conf (migración 2026-07-20).

font=JetBrainsMono Nerd Font:size=10
pad=5x5

[colors-dark]
alpha=0.75
# texto-bajo-cursor / cursor
cursor=0a0e17 00b4d8
background=0a0e17
# fg más brillante que el #cdd6f4 canónico a propósito: con alpha 0.75 el fondo
# compuesto se aclara según el wallpaper y este sostiene el contraste.
foreground=f0f4fc

selection-background=1e3a5f
selection-foreground=f0f4fc
urls=00b4d8

# black
regular0=0f1623
bright0=3b4a6b
# red (destructive)
regular1=f87171
bright1=fca5a5
# green (ok)
regular2=34d399
bright2=6ee7b7
# yellow → naranja Deep Ocean
regular3=fb923c
bright3=fdba74
# blue (azul NixOS)
regular4=3b82f6
bright4=60a5fa
# magenta → periwinkle azul-dominante (paleta sin purple/pink)
regular5=7f9cf5
bright5=9db4ff
# cyan (acento primario)
regular6=00b4d8
bright6=22d3ee
# white
regular7=f0f4fc
bright7=ffffff
