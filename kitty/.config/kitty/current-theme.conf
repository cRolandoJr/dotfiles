# kitty — Deep Ocean
# Coherente con waybar/rofi/mako/eww/hyprland. Reload: ctrl+shift+F5.

background            #0a0e17
# fg más brillante que el #cdd6f4 canónico a propósito: con background_opacity 0.75
# el fondo compuesto se aclara según el wallpaper y este sostiene el contraste.
foreground            #f0f4fc
cursor                #00b4d8
cursor_text_color     #0a0e17

selection_background  #1e3a5f
selection_foreground  #f0f4fc

url_color             #00b4d8

