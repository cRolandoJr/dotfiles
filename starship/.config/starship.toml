add_newline = false
palette = "hyprnix"

format = """
[¯éÂ](fg:base)\
$os\
[¯é┤](fg:base bg:dir)\
$directory\
[¯é┤](fg:dir bg:git)\
$git_branch\
$git_status\
[¯é┤](fg:git bg:time_bg)\
$time\
[¯é┤](fg:time_bg)\
\n$character"""

right_format = ""

[palettes.hyprnix]
# izquierda (OS + user): off-white suave
base = "#d7e3ff"
base_fg = "#0b1220"

# tonos hyprland/nix
dir = "#7aa2f7"     # azul nix
git = "#9eceff"     # ice blue
lav = "#bb9af7"     # lavanda (por si quer├®s acento)
time_bg = "#0f1a2e" # panel oscuro
time_fg = "#d7e3ff"

# estados
ok = "#a6e3a1"
warn = "#ffd166"
err = "#ff6b6b"

[os]
disabled = false
style = "bg:base fg:base_fg bold"
# si quer├®s que salga Nix s├¡ o s├¡, usa el s├¡mbolo de NixOS:
 symbols.NixOS = "´îô "
symbols.Arch = "´îô "
format = "[$symbol]($style)"

[username]
show_always = true
style_user = "bg:base fg:base_fg bold"
style_root = "bg:base fg:err bold"
format = "[$user]($style)"

[directory]
style = "bg:dir fg:base_fg bold"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

[git_branch]
symbol = "¾░èó "
style = "bg:git fg:base_fg bold"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:git fg:base_fg bold"
format = "([$all_status$ahead_behind]($style))"

[time]
disabled = false
time_format = "%R"
style = "bg:time_bg fg:time_fg bold"
format = "[ ´É║ $time ]($style)"

[character]
success_symbol = "[¾░üö](bold warn)"
error_symbol = "[¾░üö](bold err)"

[sudo]
disabled = true

[hostname]
disabled = true
