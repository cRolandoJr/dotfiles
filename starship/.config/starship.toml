add_newline = false
palette = "hyprnix"

format = """
[о‚¶](fg:base)\
$os\
[о‚ґ](fg:base bg:dir)\
$directory\
[о‚ґ](fg:dir bg:git)\
$git_branch\
$git_status\
[о‚ґ](fg:git bg:time_bg)\
$time\
[о‚ґ](fg:time_bg)\
\n$character"""

right_format = ""

[palettes.hyprnix]
# Paleta Deep Ocean вЂ” coherente con waybar/eww/mako/kitty/rofi/hyprland borders.
base = "#cdd6f4"     # fg principal
base_fg = "#0a0e17"  # bg-bar para texto sobre la "base"

# Acentos
dir = "#3b82f6"      # azul NixOS
git = "#00b4d8"      # cyan Deep Ocean
lav = "#5eead4"      # teal (acento sin purple)
time_bg = "#0f1623"  # bg-surface
time_fg = "#cdd6f4"  # fg

# Estados semГЎnticos
ok = "#34d399"       # verde Deep Ocean
warn = "#fb923c"     # naranja Deep Ocean (no yellow chillГіn)
err = "#f87171"      # rojo Deep Ocean

[os]
disabled = false
style = "bg:base fg:base_fg bold"
# si querГ©s que salga Nix sГ­ o sГ­, usa el sГ­mbolo de NixOS:
 symbols.NixOS = "пЊ“ "
symbols.Arch = "пЊ“ "
format = "[$symbol]($style)"

[username]
show_always = true
style_user = "bg:base fg:base_fg bold"
style_root = "bg:base fg:err bold"
format = "[$user]($style)"

[directory]
style = "bg:dir fg:base_fg bold"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вЂ¦/"

[git_branch]
symbol = "у°Љў "
style = "bg:git fg:base_fg bold"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:git fg:base_fg bold"
format = "([$all_status$ahead_behind]($style))"

[time]
disabled = false
time_format = "%R"
style = "bg:time_bg fg:time_fg bold"
format = "[ пђє $time ]($style)"

[character]
success_symbol = "[у°Ѓ”](bold white)"
error_symbol = "[у°Ѓ”](bold err)"

[sudo]
disabled = true

[hostname]
disabled = true
