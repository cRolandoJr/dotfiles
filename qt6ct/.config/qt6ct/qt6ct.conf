; qt6ct config — Qt6 apps usan Fusion style + paleta neon-islands.
;
; Editable en vivo: qt6ct GUI lo escribe, o editás el archivo y la próxima
; app Qt6 que abras lo levanta (no hay daemon que recargar).
;
; Apps afectadas: hyprland-share-picker, telegram-desktop, vlc, pavucontrol,
; nm-connection-editor, blueman-manager, kvantummanager (igual ya no se usa).

[Appearance]
style=Fusion
icon_theme=Adwaita-dark
standard_dialogs=default
custom_palette=true
color_scheme_path=/home/rolando/.config/qt6ct/colors/neon-islands.conf

[Interface]
activate_item_on_single_click=1
buttonbox_layout=0
cursor_flash_time=1000
dialog_buttons_have_icons=1
double_click_interval=400
keyboard_scheme=2
menus_have_icons=true
show_shortcuts_in_context_menus=true
toolbutton_style=4
underline_shortcut=1
wheel_scroll_lines=3

[Troubleshooting]
force_raster_widgets=1
