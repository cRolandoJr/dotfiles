; Paleta Deep Ocean para qt6ct.
;
; Formato qt6ct color scheme: 3 grupos (active/disabled/inactive), cada uno
; es CSV con 21 colores #FFRRGGBB en orden fijo de QPalette:
;
;   0  WindowText    7  BrightText      14 Link
;   1  Button        8  ButtonText      15 LinkVisited
;   2  Light         9  Base            16 AlternateBase
;   3  Midlight     10  Window          17 NoRole (skip / #ff000000)
;   4  Dark         11  Shadow          18 ToolTipBase
;   5  Mid          12  Highlight       19 ToolTipText
;   6  Text         13  HighlightedText 20 PlaceholderText
;
; Tokens Deep Ocean:
;   #cdd6f4 fg        #00b4d8 cyan      #3b82f6 azul NixOS
;   #0a0e17 bg-bar    #0f1623 surface   #151e2d surface2
;   #1a2744 border    #1e3a5f navy      #7a8ba8 fg-muted

[ColorScheme]
active_colors=#ffcdd6f4, #ff151e2d, #ff1e3050, #ff1a2744, #ff070b12, #ff0f1623, #ffcdd6f4, #ffffffff, #ffcdd6f4, #ff0a0e17, #ff0f1623, #ff000000, #ff00b4d8, #ff0a0e17, #ff00b4d8, #ff3b82f6, #ff0f1623, #ff000000, #ff0f1623, #ffcdd6f4, #ff7a8ba8
inactive_colors=#ffcdd6f4, #ff151e2d, #ff1e3050, #ff1a2744, #ff070b12, #ff0f1623, #ffcdd6f4, #ffffffff, #ffcdd6f4, #ff0a0e17, #ff0f1623, #ff000000, #ff1e3a5f, #ffcdd6f4, #ff1e3a5f, #ff3b82f6, #ff0f1623, #ff000000, #ff0f1623, #ffcdd6f4, #ff7a8ba8
disabled_colors=#ff7a8ba8, #ff151e2d, #ff1e3050, #ff1a2744, #ff070b12, #ff0f1623, #ff7a8ba8, #ff9aa5b8, #ff7a8ba8, #ff0a0e17, #ff0f1623, #ff000000, #ff1a2744, #ff7a8ba8, #ff1a2744, #ff2a3550, #ff0f1623, #ff000000, #ff0f1623, #ff7a8ba8, #ff5a6a85
