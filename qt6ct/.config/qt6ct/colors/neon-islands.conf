; Paleta Neon Islands para qt6ct.
;
; Formato qt6ct color scheme: 3 grupos (active/disabled/inactive), cada uno
; es CSV con 21 colores #FFRRGGBB en orden fijo de QPalette:
;
;   0  WindowText    7  BrightText      14 Link
;   1  Button        8  ButtonText      15 LinkVisited
;   2  Light         9  Base            16 AlternateBase
;   3  Midlight     10  Window          17 NoRole (skip / #ff000000)
;   4  Dark         11  Shadow          18 ToolTipBase
;   5  Mid          12  Highlight       19 ToolTipText
;   6  Text         13  HighlightedText 20 PlaceholderText
;
; Paleta neon islands:
;   #e6edf7 fg          #00A2FF cyan       #D946EF pink
;   #0F1729 window      #0B1220 base       #1a2540 button
;   #5a6a85 muted       #070b14 darkest    #2a3550 light

[ColorScheme]
active_colors=#ffe6edf7, #ff1a2540, #ff2a3550, #ff1f2b45, #ff070b14, #ff15203a, #ffe6edf7, #ffffffff, #ffe6edf7, #ff0b1220, #ff0f1729, #ff000000, #ff00a2ff, #ff0b1220, #ff00a2ff, #ffd946ef, #ff111a2e, #ff000000, #ff070b14, #ffe6edf7, #ff5a6a85
inactive_colors=#ffe6edf7, #ff1a2540, #ff2a3550, #ff1f2b45, #ff070b14, #ff15203a, #ffe6edf7, #ffffffff, #ffe6edf7, #ff0b1220, #ff0f1729, #ff000000, #ff3a4660, #ffe6edf7, #ff3a4660, #ff3a4660, #ff111a2e, #ff000000, #ff070b14, #ffe6edf7, #ff5a6a85
disabled_colors=#ff5a6a85, #ff1a2540, #ff2a3550, #ff1f2b45, #ff070b14, #ff15203a, #ff5a6a85, #ff8b95a6, #ff5a6a85, #ff0b1220, #ff0f1729, #ff000000, #ff15203a, #ff5a6a85, #ff15203a, #ff15203a, #ff111a2e, #ff000000, #ff070b14, #ffe6edf7, #ff5a6a85
